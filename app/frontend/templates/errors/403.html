{% extends "base.html" %}

{% block title %}Acesso Negado - {{ app_name }}{% endblock %}

{% block content %}
<div class="container d-flex flex-column align-items-center justify-content-center min-vh-75 py-5 fade-in-up">
    <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center bg-danger-subtle text-danger rounded-circle shadow-lg mb-4 hover-scale" style="width: 120px; height: 120px;">
            <i class="bi bi-shield-lock-fill fs-1"></i>
        </div>
        <h1 class="display-1 fw-bold text-danger mb-2">403</h1>
        <h2 class="h4 text-muted mb-4">Acesso Negado</h2>
        <p class="lead text-muted mb-5 mw-md mx-auto" style="max-width: 500px;">
            Você não tem permissão para acessar esta página. Verifique suas credenciais ou entre em contato com o administrador.
        </p>
        
        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary rounded-pill px-4 py-2 shadow-sm hover-scale transition-all">
                <i class="bi bi-house-door-fill me-2"></i>Ir para o Dashboard
            </a>
            <button onclick="history.back()" class="btn btn-outline-secondary rounded-pill px-4 py-2 hover-scale transition-all">
                <i class="bi bi-arrow-left me-2"></i>Voltar
            </button>
        </div>
    </div>
</div>
{% endblock %}
